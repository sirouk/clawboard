name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  CI: "1"
  CLAWBOARD_BACKEND_TEST_MODE: "host"
  CLAWBOARD_VECTOR_PREWARM: "0"
  HF_HUB_DISABLE_PROGRESS_BARS: "1"

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Logger runtime sync
        run: pnpm run check:logger-runtime-sync

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Coverage gates
        run: pnpm run test:coverage

      - name: Upload coverage traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-traces
          path: coverage/trace
          if-no-files-found: ignore
          retention-days: 14

  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Backend tests
        run: pnpm run test:backend

      - name: Classifier tests
        run: pnpm run test:classifier

      - name: Logger tests
        run: pnpm run test:logger

      - name: Script tests
        run: pnpm run test:scripts

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Production build
        run: pnpm run build:webpack

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm run test:e2e:ci

      - name: Upload e2e artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 14

  visual:
    name: visual
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run visual tests
        run: pnpm run test:visual:ci

      - name: Upload visual artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-playwright-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 14

  required-gate:
    name: required-gate
    runs-on: ubuntu-latest
    needs:
      - quality
      - coverage
      - unit
      - build
      - e2e
      - visual
    if: ${{ always() }}
    steps:
      - name: Verify required jobs
        run: |
          if [ "${{ needs.quality.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ] || \
             [ "${{ needs.unit.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.e2e.result }}" != "success" ] || \
             [ "${{ needs.visual.result }}" != "success" ]; then
            echo "At least one required job failed."
            exit 1
          fi
          echo "All required jobs passed."
