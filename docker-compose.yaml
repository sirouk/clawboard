services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      CLAWBOARD_DB_URL: ${CLAWBOARD_DB_URL:-postgresql+psycopg://clawboard:clawboard@db:5432/clawboard}
      CLAWBOARD_CORS_ORIGINS: "*"
      CLAWBOARD_REINDEX_QUEUE_PATH: /app/data/reindex-queue.jsonl
      CLAWBOARD_VECTOR_REQUIRE_QDRANT: ${CLAWBOARD_VECTOR_REQUIRE_QDRANT:-1}
      CLAWBOARD_CHANGES_PRECOMPILE_LIMIT_LOGS: ${CLAWBOARD_CHANGES_PRECOMPILE_LIMIT_LOGS:-500}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-clawboard_embeddings}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      OPENCLAW_GATEWAY_IDENTITY_DIR: ${OPENCLAW_HOME:-/tmp/.openclaw}
      # CLAWBOARD_TOKEN is read from .env via env_file
    volumes:
      - ./data:/app/data
      - ${OPENCLAW_HOME:-/tmp/.openclaw}:${OPENCLAW_HOME:-/tmp/.openclaw}
    ports:
      - "8010:8000"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - edge
      - core

  classifier:
    build:
      context: ./classifier
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      CLAWBOARD_API_BASE: http://api:8000
      CLAWBOARD_VECTOR_REQUIRE_QDRANT: ${CLAWBOARD_VECTOR_REQUIRE_QDRANT:-1}
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-http://host.docker.internal:18789}
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:-openai-codex/gpt-5.2}
      # "auto" uses the OpenClaw LLM when credentials are configured; "off" forces heuristic mode.
      CLASSIFIER_LLM_MODE: ${CLASSIFIER_LLM_MODE:-auto}
      CLASSIFIER_INTERVAL_SECONDS: ${CLASSIFIER_INTERVAL_SECONDS:-10}
      CLASSIFIER_MAX_ATTEMPTS: ${CLASSIFIER_MAX_ATTEMPTS:-3}
      CLASSIFIER_WINDOW_SIZE: ${CLASSIFIER_WINDOW_SIZE:-24}
      CLASSIFIER_LOOKBACK_LOGS: ${CLASSIFIER_LOOKBACK_LOGS:-80}
      CLASSIFIER_TOPIC_SIM_THRESHOLD: ${CLASSIFIER_TOPIC_SIM_THRESHOLD:-0.78}
      CLASSIFIER_TASK_SIM_THRESHOLD: ${CLASSIFIER_TASK_SIM_THRESHOLD:-0.80}
      CLASSIFIER_EMBED_MODEL: ${CLASSIFIER_EMBED_MODEL:-BAAI/bge-small-en-v1.5}
      CLASSIFIER_REINDEX_QUEUE_PATH: /data/reindex-queue.jsonl
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-clawboard_embeddings}
      QDRANT_DIM: ${QDRANT_DIM:-384}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    depends_on:
      api:
        condition: service_started
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/data
      - ${HOME}/.openclaw/memory:/data/openclaw-memory:ro
      # Persist HF/fastembed caches across container recreations (stabilizes classifier startup + E2E).
      - clawboard_classifier_cache:/root/.cache
    restart: unless-stopped
    networks:
      - edge
      - core

  searxng:
    image: searxng/searxng:latest
    container_name: clawboard-searxng
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "8888:8080"
    restart: unless-stopped
    networks:
      - edge

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # IMPORTANT: this value is baked into the browser bundle.
        # For remote (Tailscale) access, set CLAWBOARD_PUBLIC_API_BASE in .env
        NEXT_PUBLIC_CLAWBOARD_API_BASE: ${CLAWBOARD_PUBLIC_API_BASE:-http://localhost:8010}
        # Optional default UI token, also baked into browser bundle.
        NEXT_PUBLIC_CLAWBOARD_DEFAULT_TOKEN: ${NEXT_PUBLIC_CLAWBOARD_DEFAULT_TOKEN:-}
        NEXT_PUBLIC_CLAWBOARD_UNIFIED_TOPICS_PAGE_SIZE: ${NEXT_PUBLIC_CLAWBOARD_UNIFIED_TOPICS_PAGE_SIZE:-50}
        NEXT_PUBLIC_CLAWBOARD_INITIAL_CHANGES_LIMIT_LOGS: ${NEXT_PUBLIC_CLAWBOARD_INITIAL_CHANGES_LIMIT_LOGS:-500}
    env_file:
      - .env
    environment:
      # IMPORTANT: this is used client-side; must be reachable from the browser.
      NEXT_PUBLIC_CLAWBOARD_API_BASE: ${CLAWBOARD_PUBLIC_API_BASE:-http://localhost:8010}
      NEXT_PUBLIC_CLAWBOARD_DEFAULT_TOKEN: ${NEXT_PUBLIC_CLAWBOARD_DEFAULT_TOKEN:-}
      NEXT_PUBLIC_CLAWBOARD_UNIFIED_TOPICS_PAGE_SIZE: ${NEXT_PUBLIC_CLAWBOARD_UNIFIED_TOPICS_PAGE_SIZE:-50}
      NEXT_PUBLIC_CLAWBOARD_INITIAL_CHANGES_LIMIT_LOGS: ${NEXT_PUBLIC_CLAWBOARD_INITIAL_CHANGES_LIMIT_LOGS:-500}
      # Next.js /api proxy target (server-side only, never exposed to browser JS).
      CLAWBOARD_SERVER_API_BASE: ${CLAWBOARD_SERVER_API_BASE:-http://api:8000}
      # Optional fallback header token for server-side proxy forwarding.
      CLAWBOARD_SERVER_API_TOKEN: ${CLAWBOARD_TOKEN:-}
      # Internal companion URL for auto-authing the embedded code-server iframe.
      CLAWBOARD_WORKSPACE_IDE_INTERNAL_BASE_URL: ${CLAWBOARD_WORKSPACE_IDE_INTERNAL_BASE_URL:-http://workspace-ide:8080}
    depends_on:
      - api
      - workspace-ide
      - workspace-ide-coding
    ports:
      - "3010:3000"
    restart: unless-stopped
    networks:
      - edge

  web-dev:
    profiles: ["dev"]
    image: node:20-alpine
    env_file:
      - .env
    environment:
      # IMPORTANT: this is used client-side; must be reachable from the browser.
      NEXT_PUBLIC_CLAWBOARD_API_BASE: ${CLAWBOARD_PUBLIC_API_BASE:-http://localhost:8010}
      NEXT_PUBLIC_CLAWBOARD_DEFAULT_TOKEN: ${NEXT_PUBLIC_CLAWBOARD_DEFAULT_TOKEN:-}
      NEXT_PUBLIC_CLAWBOARD_UNIFIED_TOPICS_PAGE_SIZE: ${NEXT_PUBLIC_CLAWBOARD_UNIFIED_TOPICS_PAGE_SIZE:-50}
      NEXT_PUBLIC_CLAWBOARD_INITIAL_CHANGES_LIMIT_LOGS: ${NEXT_PUBLIC_CLAWBOARD_INITIAL_CHANGES_LIMIT_LOGS:-500}
      # Next.js /api proxy target (server-side only, never exposed to browser JS).
      CLAWBOARD_SERVER_API_BASE: ${CLAWBOARD_SERVER_API_BASE:-http://api:8000}
      # Optional fallback header token for server-side proxy forwarding.
      CLAWBOARD_SERVER_API_TOKEN: ${CLAWBOARD_TOKEN:-}
      # Internal companion URL for auto-authing the embedded code-server iframe.
      CLAWBOARD_WORKSPACE_IDE_INTERNAL_BASE_URL: ${CLAWBOARD_WORKSPACE_IDE_INTERNAL_BASE_URL:-http://workspace-ide:8080}
      # Docker Desktop file watching can be flaky; polling is slower but reliable.
      WATCHPACK_POLLING: ${CLAWBOARD_WEB_WATCHPACK_POLLING:-true}
      WATCHPACK_POLLING_INTERVAL: ${CLAWBOARD_WEB_WATCHPACK_POLLING_INTERVAL:-1000}
    depends_on:
      - api
      - workspace-ide
      - workspace-ide-coding
    ports:
      - "3010:3000"
    working_dir: /app
    command: >
      sh -lc "./scripts/web-dev-entrypoint.sh"
    volumes:
      - .:/app
      - clawboard_web_node_modules:/app/node_modules
      - clawboard_web_next_cache:/app/.next
    networks:
      - edge

  workspace-ide:
    image: codercom/code-server:latest
    environment:
      PASSWORD: ${CLAWBOARD_TOKEN:-}
      DOCKER_USER: ${USER:-coder}
    command: >
      --bind-addr 0.0.0.0:8080
      --auth password
      --disable-telemetry
    ports:
      - "${CLAWBOARD_WORKSPACE_IDE_PORT:-13337}:8080"
    volumes:
      - ${OPENCLAW_HOME:-/tmp/.openclaw}:${OPENCLAW_HOME:-/tmp/.openclaw}
      - ./data/code-server/config:/home/coder/.config/code-server
      - ./data/code-server/local:/home/coder/.local/share/code-server
    restart: unless-stopped
    networks:
      - edge

  workspace-ide-coding:
    image: codercom/code-server:latest
    environment:
      PASSWORD: ${CLAWBOARD_TOKEN:-}
      DOCKER_USER: ${USER:-coder}
    command: >
      --bind-addr 0.0.0.0:8080
      --auth password
      --disable-telemetry
    ports:
      - "${CLAWBOARD_WORKSPACE_IDE_CODING_PORT:-13338}:8080"
    volumes:
      - ${OPENCLAW_HOME:-/tmp/.openclaw}/workspace-coding:/workspace
      - ./data/code-server-coding/config:/home/coder/.config/code-server
      - ./data/code-server-coding/local:/home/coder/.local/share/code-server
    restart: unless-stopped
    networks:
      - edge

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clawboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clawboard}
      POSTGRES_DB: ${POSTGRES_DB:-clawboard}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clawboard} -d ${POSTGRES_DB:-clawboard} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - core

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - ./data/qdrant:/qdrant/storage
    expose:
      - "6333"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf \"GET /readyz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && timeout 2 cat <&3 | grep -q \"200 OK\"'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - core

  redis:
    image: redis:7-alpine
    profiles: ["scale"]
    expose:
      - "6379"
    networks:
      - core

networks:
  edge:
    driver: bridge
  core:
    driver: bridge

volumes:
  clawboard_web_node_modules:
  clawboard_web_next_cache:
  clawboard_classifier_cache:
