use_default_settings:
  engines:
    keep_only:
      - google
      - bing
      - duckduckgo
      - wikipedia

general:
  instance_name: "ClawBoard SearXNG"

search:
  default_lang: "en"
  autocomplete: "duckduckgo"
  formats:
    - json

server:
  secret_key: "clawboard-searxng-local-dev-key"
  limiter: false
  image_proxy: false

engines:
  - name: google
    disabled: false
  - name: bing
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: wikipedia
    disabled: false
